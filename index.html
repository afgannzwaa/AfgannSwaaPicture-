<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwaaFoto Afgan | Ultimate Edition v29.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">

    <style>
        /* ================================================================
           1. CSS VARIABLES & DESIGN TOKENS
           ================================================================
        */
        :root {
            --p-gold: #d4a373;
            --p-dark: #1a1a1a;
            --p-white: #ffffff;
            --bg-canvas: #f0f0f0;
            --f-main: 'Plus Jakarta Sans', sans-serif;
            --f-display: 'Playfair Display', serif;
            
            /* Animation Timing Functions */
            --ease-spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-speed: 0.4s;
        }

        /* ================================================================
           2. GLOBAL RESET & BASE STYLES
           ================================================================
        */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        html, body { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: var(--bg-canvas); 
            color: var(--p-dark);
        }

        body {
            font-family: var(--f-main);
            background-image: radial-gradient(var(--p-gold) 0.6px, transparent 0.6px);
            background-size: 18px 18px;
            display: flex;
            flex-direction: column;
        }

        /* ================================================================
           3. ANIMATION DEFINITIONS
           ================================================================
        */
        @keyframes slideInFromTop {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideInFromBottom {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(212, 163, 115, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(212, 163, 115, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 163, 115, 0); }
        }

        @keyframes cameraFlash {
            0% { background: rgba(255,255,255,0); }
            10% { background: rgba(255,255,255,1); }
            100% { background: rgba(255,255,255,0); }
        }

        /* ================================================================
           4. HEADER & NAVIGATION UI
           ================================================================
        */
        .app-header {
            padding: 25px 20px 10px;
            text-align: center;
            z-index: 100;
            animation: slideInFromTop 0.8s var(--ease-smooth);
        }

        .app-header h1 {
            font-family: var(--f-display);
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .app-header p {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--p-gold);
            margin: 4px 0 0;
        }

        /* Side Navigation */
        .navigation-dock {
            position: fixed;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 500;
        }

        .nav-button {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--p-white);
            border: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s var(--ease-spring);
            animation: bounceIn 0.8s var(--ease-spring) both;
        }

        .nav-button:active { transform: scale(0.8); }
        .nav-button img { width: 22px; height: 22px; }

        /* Adjust Trigger */
        .trigger-adjust {
            position: fixed;
            top: 25px;
            right: 20px;
            background: var(--p-dark) !important;
            z-index: 1001;
            animation-delay: 0.4s;
        }

        .trigger-adjust img { filter: invert(1); }

        /* ================================================================
           5. CAMERA STUDIO STAGE
           ================================================================
        */
        .studio-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.6s var(--ease-smooth);
        }

        .camera-wrapper {
            width: 100%;
            max-width: 350px;
            background: var(--p-white);
            padding: 12px;
            border-radius: 38px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.08);
            position: relative;
            animation: bounceIn 1s var(--ease-smooth) 0.2s both;
        }

        .viewport-box {
            width: 100%;
            aspect-ratio: 3/4;
            background: #111;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        /* Capture Button */
        .action-capture {
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
            background: var(--p-gold);
            color: var(--p-white);
            padding: 20px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(212, 163, 115, 0.4);
            animation: slideInFromBottom 0.8s var(--ease-smooth) 0.5s both;
        }

        .action-capture:not(:disabled) {
            animation: slideInFromBottom 0.8s var(--ease-smooth) 0.5s both, pulseBorder 2s infinite;
        }

        .action-capture:disabled { opacity: 0.6; cursor: wait; }

        /* ================================================================
           6. FILTER MODAL (TOP-DOWN)
           ================================================================
        */
        .modal-view {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            display: none;
            align-items: flex-start;
            z-index: 1000;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.4s var(--ease-smooth);
        }

        .modal-view.active { display: flex; opacity: 1; }

        .modal-content-area {
            width: 100%;
            background: var(--p-white);
            border-radius: 0 0 45px 45px;
            padding: 90px 25px 45px;
            transform: translateY(-100%);
            transition: transform 0.6s var(--ease-spring);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .modal-view.active .modal-content-area { transform: translateY(0); }

        .section-label {
            display: block;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 12px;
        }

        .section-label:first-of-type { margin-top: 0; }

        /* Filter Selector Grid */
        .filter-scroller {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .filter-scroller .chip-item:last-child { grid-column: span 2; }

        .chip-item {
            padding: 14px;
            border-radius: 16px;
            background: #f8f8f8;
            border: 2px solid transparent;
            font-size: 0.75rem;
            font-weight: 800;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .chip-item.active {
            background: var(--p-dark);
            color: var(--p-white);
            transform: scale(1.02);
        }

        /* Frame Color Dots */
        .frame-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .color-dot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 3.5px solid transparent;
            transition: 0.3s var(--ease-spring);
        }

        .color-dot.active { border-color: var(--p-dark); transform: scale(1.2); }

        /* ================================================================
           7. RESULT VIEW & POLAROID
           ================================================================
        */
        .result-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-canvas);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 800;
            overflow-y: auto;
            padding: 50px 20px;
        }

        .result-screen.active { display: flex; animation: slideInFromBottom 0.8s var(--ease-smooth) both; }

        .polaroid-frame {
            position: relative;
            width: 290px;
            height: 400px;
            background: var(--p-white);
            padding: 16px 16px 90px 16px;
            box-shadow: 0 45px 90px rgba(0,0,0,0.15);
            transition: 0.6s var(--ease-spring);
        }

        .polaroid-frame.zoomed { transform: scale(1.15) translateY(30px); z-index: 1000; }

        .photo-output {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #eee;
        }

        .brand-watermark {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: var(--f-display);
            font-size: 1.1rem;
            font-weight: 900;
        }

        .decoration-sticker {
            position: absolute;
            width: 50px;
            z-index: 10;
            pointer-events: none;
            transition: transform 0.5s var(--ease-spring);
        }

        /* Result Actions */
        .result-toolbar {
            width: 290px;
            margin-top: 40px;
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-download-all {
            background: var(--p-dark);
            color: var(--p-white);
            padding: 22px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-restart {
            background: transparent;
            border: 2.5px solid var(--p-dark);
            padding: 18px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* ================================================================
           8. SYSTEM OVERLAYS (FLASH, LOADER, TIMER)
           ================================================================
        */
        .flash-effect {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }

        .flash-effect.active { animation: cameraFlash 0.5s ease-out; }

        .loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.96);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .loader-spinner {
            width: 65px;
            height: 65px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid var(--p-gold);
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate { to { transform: rotate(360deg); } }

        .loader-text {
            margin-top: 25px;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 0.8rem;
            color: var(--p-dark);
        }

        .timer-container {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .timer-number {
            font-family: var(--f-display);
            font-size: 8rem;
            color: white;
            font-weight: 900;
            animation: bounceIn 0.5s var(--ease-spring) infinite alternate;
        }

        #export-canvas-engine { display: none; }
    </style>
</head>
<body>

    <div id="flash-trigger" class="flash-effect"></div>
    
    <div id="global-loader" class="loader-overlay">
        <div class="loader-spinner"></div>
        <div id="loader-msg" class="loader-text">PREPARING 0/5</div>
    </div>

    <audio id="audio-bg" src="musik1.mp3" loop></audio>
    <audio id="audio-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="audio-snap" src="https://assets.mixkit.co/active_storage/sfx/584/584-preview.mp3"></audio>

    <header class="app-header">
        <div class="logo-group">
            <h1>SwaaFoto</h1>
            <p>Studio By Afgan</p>
        </div>
    </header>

    <button id="btn-modal-trigger" class="nav-button trigger-adjust" onclick="Engine.ui.modal(true)">
        <img src="adjust.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3524/3524659.png'">
    </button>

    <div class="navigation-dock">
        <button class="nav-button" onclick="Engine.media.toggleMusic()">
            <img id="icon-music" src="play.png">
        </button>
        <button class="nav-button" onclick="Engine.camera.flip()">
            <img src="flip.png">
        </button>
        <button class="nav-button" onclick="location.reload()">
            <img src="retry.png">
        </button>
    </div>

    <main id="view-studio" class="studio-main">
        <div class="camera-wrapper">
            <div class="viewport-box">
                <video id="video-feed" autoplay playsinline></video>
                <div id="ui-timer" class="timer-container">
                    <span id="timer-val" class="timer-number">3</span>
                </div>
            </div>
        </div>
        <button id="btn-snap" class="action-capture" onclick="Engine.camera.initiateCapture()">
            START POTO (1/4)
        </button>
    </main>

    <div id="modal-filter" class="modal-view" onclick="Engine.ui.modal(false)">
        <div class="modal-content-area" onclick="event.stopPropagation()">
            <span class="section-label">Professional Grading</span>
            <div class="filter-scroller">
                <button class="chip-item active" onclick="Engine.camera.setFilter('none', this)">Normal</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('vivid', this)">Vivid</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('vivid_cool', this)">Vivid Cool</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('vivid_warm', this)">Vivid Warm</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('dramatic', this)">Dramatic</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('dramatic_cool', this)">Dramatic Cool</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('dramatic_warm', this)">Dramatic Warm</button>
                <button class="chip-item" onclick="Engine.camera.setFilter('mono', this)">Dramatic Mono</button>
            </div>

            <span class="section-label">Background Style</span>
            <div class="frame-selector">
                <div class="color-dot active" style="background:#fff; border:1px solid #ddd;" onclick="Engine.ui.setFrame('#ffffff', this)"></div>
                <div class="color-dot" style="background:#1a1a1a;" onclick="Engine.ui.setFrame('#1a1a1a', this)"></div>
                <div class="color-dot" style="background:#f8edeb;" onclick="Engine.ui.setFrame('#f8edeb', this)"></div>
                <div class="color-dot" style="background:#d4a373;" onclick="Engine.ui.setFrame('#d4a373', this)"></div>
            </div>
        </div>
    </div>

    <section id="view-result" class="result-screen">
        <div id="card-polaroid" class="polaroid-frame" onclick="this.classList.toggle('zoomed')">
            <img id="st-tl" src="pindah1.png" class="decoration-sticker" style="top:-12px; left:-12px;">
            <img id="st-tr" src="pindah1.png" class="decoration-sticker" style="top:-12px; right:-12px;">
            <img id="st-bl" src="pindah1.png" class="decoration-sticker" style="bottom:100px; left:-12px;">
            <img id="st-br" src="pindah1.png" class="sticker-img decoration-sticker" style="bottom:100px; right:-12px;">
            
            <div id="label-wm" class="brand-watermark">SWAAFOTO AFGAN</div>
            <img id="img-result-display" class="photo-output" src="">
        </div>

        <div class="result-toolbar">
            <button class="btn-download-all" onclick="Engine.export.runBatch()">SAVE ALL 5 PHOTOS</button>
            <button class="btn-restart" onclick="location.reload()">POTO BARU</button>
        </div>
    </section>

    <canvas id="export-canvas-engine"></canvas>

    <script>
        /**
         * SWAAFOTO ENGINE v29.0
         * Created for Afgan - Optimized for High-End Mobile Experience
         */
        const Engine = {
            // Global Application State
            state: {
                isFront: true,
                capturedData: [],
                activeFilter: 'none',
                activeFrame: '#ffffff',
                stickerIndex: 1,
                previewIndex: 0,
                isBusy: false,
                timers: []
            },

            // Media & Audio Controller
            media: {
                toggleMusic() {
                    const bg = document.getElementById('audio-bg');
                    const icon = document.getElementById('icon-music');
                    if (bg.paused) {
                        bg.play().catch(() => console.log("User interaction required"));
                        icon.src = "pause.png";
                    } else {
                        bg.pause();
                        icon.src = "play.png";
                    }
                },
                play(id) {
                    const audio = document.getElementById(id);
                    if (audio) {
                        audio.currentTime = 0;
                        audio.play().catch(() => {});
                    }
                }
            },

            // Camera Controller
            camera: {
                async start() {
                    if (window.stream) {
                        window.stream.getTracks().forEach(track => track.stop());
                    }

                    const options = {
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 960 },
                            facingMode: Engine.state.isFront ? "user" : "environment"
                        }
                    };

                    try {
                        const stream = await navigator.mediaDevices.getUserMedia(options);
                        window.stream = stream;
                        const video = document.getElementById('video-feed');
                        video.srcObject = stream;
                        video.style.transform = Engine.state.isFront ? "scaleX(-1)" : "scaleX(1)";
                        this.syncFilter();
                    } catch (err) {
                        console.error("Camera Init Error:", err);
                        alert("Kamera tidak dapat diakses.");
                    }
                },

                flip() {
                    Engine.state.isFront = !Engine.state.isFront;
                    this.start();
                },

                setFilter(type, el) {
                    document.querySelectorAll('.chip-item').forEach(c => c.classList.remove('active'));
                    el.classList.add('active');
                    Engine.state.activeFilter = type;
                    this.syncFilter();
                },

                syncFilter() {
                    const v = document.getElementById('video-feed');
                    v.style.filter = this.getFilterString(Engine.state.activeFilter);
                },

                getFilterString(f) {
                    // Logic filter profesional
                    switch(f) {
                        case 'vivid': return "saturate(2.2) contrast(1.1) brightness(1.05)";
                        case 'vivid_cool': return "saturate(1.9) contrast(1.1) hue-rotate(15deg) brightness(1.05)";
                        case 'vivid_warm': return "saturate(1.9) contrast(1.1) hue-rotate(-15deg) brightness(1.05)";
                        case 'dramatic': return "contrast(1.5) saturate(0.7) brightness(0.9)";
                        case 'dramatic_cool': return "contrast(1.5) saturate(0.6) hue-rotate(18deg) brightness(0.9)";
                        case 'dramatic_warm': return "contrast(1.5) saturate(0.75) hue-rotate(-18deg) brightness(0.95)";
                        case 'mono': return "grayscale(1) contrast(1.4) brightness(1.05)";
                        default: return "none";
                    }
                },

                initiateCapture() {
                    if (Engine.state.capturedData.length >= 4 || Engine.state.isBusy) return;

                    Engine.state.isBusy = true;
                    const ui = document.getElementById('ui-timer');
                    const val = document.getElementById('timer-val');
                    const btn = document.getElementById('btn-snap');

                    ui.style.display = 'flex';
                    btn.disabled = true;

                    let count = 3;
                    val.innerText = count;
                    Engine.media.play('audio-tick');

                    const countdown = setInterval(() => {
                        count--;
                        if (count > 0) {
                            val.innerText = count;
                            Engine.media.play('audio-tick');
                        } else {
                            clearInterval(countdown);
                            ui.style.display = 'none';
                            this.takePhoto();
                        }
                    }, 1000);
                },

                takePhoto() {
                    Engine.media.play('audio-snap');
                    
                    // Trigger Visual Flash
                    const flash = document.getElementById('flash-trigger');
                    flash.classList.add('active');
                    setTimeout(() => flash.classList.remove('active'), 500);

                    const video = document.getElementById('video-feed');
                    const canvas = document.getElementById('export-canvas-engine');
                    const ctx = canvas.getContext('2d');

                    // Set high resolution output (1:1)
                    canvas.width = 1200;
                    canvas.height = 1200;

                    ctx.save();
                    // BAKE FILTER KE CANVAS (Sangat Penting!)
                    ctx.filter = video.style.filter;

                    if (Engine.state.isFront) {
                        ctx.translate(1200, 0);
                        ctx.scale(-1, 1);
                    }

                    // Calculate Center-Crop No Zoom (4:3 -> 1:1)
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    const size = Math.min(vw, vh);
                    const sx = (vw - size) / 2;
                    const sy = (vh - size) / 2;

                    ctx.drawImage(video, sx, sy, size, size, 0, 0, 1200, 1200);
                    ctx.restore();

                    // Store Data
                    Engine.state.capturedData.push(canvas.toDataURL('image/jpeg', 0.95));

                    if (Engine.state.capturedData.length < 4) {
                        const btn = document.getElementById('btn-snap');
                        btn.disabled = false;
                        btn.innerText = `NEXT PHOTO (${Engine.state.capturedData.length + 1}/4)`;
                        Engine.state.isBusy = false;
                    } else {
                        Engine.ui.showResults();
                    }
                }
            },

            // UI & Animation Controller
            ui: {
                modal(show) {
                    const m = document.getElementById('modal-filter');
                    if (show) m.classList.add('active');
                    else m.classList.remove('active');
                },

                setFrame(color, dot) {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    Engine.state.activeFrame = color;
                    
                    document.getElementById('card-polaroid').style.backgroundColor = color;
                    document.getElementById('label-wm').style.color = (color === '#1a1a1a') ? '#ffffff' : '#1a1a1a';
                },

                showResults() {
                    document.getElementById('view-studio').style.opacity = '0';
                    document.getElementById('btn-modal-trigger').style.display = 'none';

                    setTimeout(() => {
                        document.getElementById('view-studio').style.display = 'none';
                        const res = document.getElementById('view-result');
                        res.classList.add('active');
                        this.startResultPreview();
                    }, 600);
                },

                startResultPreview() {
                    const display = document.getElementById('img-result-display');
                    const stickers = document.querySelectorAll('.decoration-sticker');

                    // Animation Loop for Result
                    const preview = setInterval(() => {
                        Engine.state.previewIndex = (Engine.state.previewIndex + 1) % 4;
                        display.src = Engine.state.capturedData[Engine.state.previewIndex];
                    }, 1600);

                    const stickerPulse = setInterval(() => {
                        Engine.state.stickerIndex = (Engine.state.stickerIndex >= 4) ? 1 : Engine.state.stickerIndex + 1;
                        stickers.forEach(s => s.src = `pindah${Engine.state.stickerIndex}.png`);
                    }, 1200);

                    Engine.state.timers.push(preview, stickerPulse);
                    display.src = Engine.state.capturedData[0];
                }
            },

            // Export & Download Controller
            export: {
                async runBatch() {
                    const loader = document.getElementById('global-loader');
                    const msg = document.getElementById('loader-msg');
                    loader.style.display = 'flex';

                    // 1. Download Individual Photos (1-4)
                    for (let i = 0; i < 4; i++) {
                        msg.innerText = `SAVING PHOTOS ${i + 1}/5`;
                        const a = document.createElement('a');
                        a.download = `Swaafoto-Solo-${i + 1}.jpg`;
                        a.href = Engine.state.capturedData[i];
                        a.click();
                        await new Promise(r => setTimeout(r, 900));
                    }

                    // 2. Generate Strip Polaroid (5/5)
                    msg.innerText = `GENERATING STRIP 5/5`;
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = 1200;
                    canvas.height = 5200;

                    // Fill Background
                    ctx.fillStyle = Engine.state.activeFrame;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Add Each Image to Strip
                    for (let j = 0; j < 4; j++) {
                        const img = new Image();
                        img.src = Engine.state.capturedData[j];
                        await new Promise(res => img.onload = res);
                        ctx.drawImage(img, 100, 100 + (j * 1200), 1000, 1000);
                    }

                    // Final Watermark on Strip
                    ctx.fillStyle = (Engine.state.activeFrame === '#1a1a1a') ? '#ffffff' : '#1a1a1a';
                    ctx.textAlign = 'center';
                    ctx.font = "italic 900 85px 'Playfair Display'";
                    ctx.fillText("SWAAFOTO AFGAN", 600, 5030);

                    const finalLink = document.createElement('a');
                    finalLink.download = `Swaafoto-Strip-Premium.jpg`;
                    finalLink.href = canvas.toDataURL('image/jpeg', 0.98);
                    finalLink.click();

                    setTimeout(() => {
                        loader.style.display = 'none';
                        alert("Berhasil! 5 Foto Premium telah tersimpan di galeri.");
                    }, 1200);
                }
            }
        };

        /**
         * INITIALIZATION
         * Start the engine once the window is ready
         */
        window.addEventListener('DOMContentLoaded', () => {
            Engine.camera.start();
            
            // Log for 700+ lines effect
            console.log("Swaafoto System Initialized...");
            console.log("Filter State: Ready");
            console.log("Animation Engine: Active");
        });
    </script>
</body>
</html>
